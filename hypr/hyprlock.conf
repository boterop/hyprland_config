background {
    path = screenshot
    blur_passes = 3
    blur_size = 8
}

general {
    hide_cursor = true
    grace = 2
}

input-field {
    size = 260, 55

    outline_thickness = 2

    dots_size = 0.2
    dots_spacing = 0.35

    outer_color = rgb(89b4fa)
    inner_color = rgb(11111b)
    font_color = rgb(cdd6f4)

    fade_on_empty = false

    rounding = 14

    placeholder_text = Password...

    position = 0, -20
    halign = center
    valign = center
}

label {
    text = cmd[update:1000] echo "$(date +'%H:%M')"

    color = rgba(cdd6f4ff)

    font_size = 64

    position = 0, 80
    halign = center
    valign = center
}
